<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings — Fire Monitoring</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: Inter, sans-serif; background:#f3f4f6; color:#111827; padding:20px; }
    .card { background:white; padding:16px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.05); }
    .page { max-width:900px; margin:auto; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card mb-4">
      <div class="flex justify-between items-center mb-3">
        <div>
          <div class="font-bold text-lg">Settings</div>
          <div class="text-sm text-gray-500">User preferences for the dashboard</div>
        </div>
        <a href="index.html" class="px-3 py-1 rounded bg-gray-100">Back</a>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Theme</label>
          <div class="flex items-center gap-3">
            <button id="light-btn" class="px-3 py-1 rounded bg-gray-100">Light</button>
            <button id="dark-btn" class="px-3 py-1 rounded bg-gray-800 text-white">Dark</button>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Other settings</label>
          <p class="text-xs text-gray-500">More options coming soon (e.g., alert recipients, thresholds).</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const setThemeValue = (t) => {
      localStorage.setItem('theme', t);
      // Also update main window if this tab was opened from main
      try { if (window.opener && !window.opener.closed) window.opener.postMessage({ action: 'setTheme', value: t }, '*'); } catch(e){}
      alert('Theme set to ' + t + '. Return to dashboard for immediate effect.');
    };
    document.getElementById('light-btn').onclick = () => setThemeValue('light');
    document.getElementById('dark-btn').onclick = () => setThemeValue('dark');
  </script>
</body>
</html>
