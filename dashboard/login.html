<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Fire Monitoring</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">

    <!-- Logo -->
    <div class="flex justify-center mb-4">
      <img src="./logo.png" alt="FIRO Logo" class="w-20 h-20 rounded" />
    </div>

    <h2 id="form-title" class="text-2xl font-bold text-center mb-6 text-green-700">
      Fire Monitoring Login
    </h2>

    <!-- Loading state while config fetches -->
    <div id="loading-msg" class="text-center text-gray-400 text-sm mb-4">
      Connecting to server…
    </div>

    <form id="auth-form" class="space-y-4 hidden">
      <input id="email"    type="email"    placeholder="Email"
             class="w-full px-4 py-2 border rounded" required />
      <input id="password" type="password" placeholder="Password (min 6 chars)"
             class="w-full px-4 py-2 border rounded" required />

      <button id="submit-btn" type="submit"
              class="w-full bg-green-600 text-white py-2 rounded hover:bg-green-700">
        Login
      </button>
    </form>

    <p class="text-center text-sm mt-4 hidden" id="toggle-row">
      <span id="toggle-text">Don't have an account?</span>
      <button id="toggle-btn" class="text-green-600 font-semibold ml-1">Sign Up</button>
    </p>

    <p id="error" class="text-red-500 text-sm mt-3 text-center"></p>
  </div>

  <!-- ── Firebase Auth (config loaded from app.py) ── -->
  <script type="module">
    import { initFirebase } from "./firebase-init.js";
    import {
      setPersistence,
      browserSessionPersistence,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const loadingMsg = document.getElementById("loading-msg");
    const authForm   = document.getElementById("auth-form");
    const toggleRow  = document.getElementById("toggle-row");
    const errorEl    = document.getElementById("error");
    const submitBtn  = document.getElementById("submit-btn");
    const toggleBtn  = document.getElementById("toggle-btn");
    const toggleText = document.getElementById("toggle-text");
    const title      = document.getElementById("form-title");

    let isSignup = false;

    try {
      // ── Load config from app.py → initialize Firebase ──
      const { auth } = await initFirebase();

      // Session only — logs out when tab closes
      await setPersistence(auth, browserSessionPersistence);

      // If already logged in redirect immediately
      onAuthStateChanged(auth, (user) => {
        if (user && !user.isAnonymous) {
          window.location.replace("/");
        }
      });

      // Show form now that Firebase is ready
      loadingMsg.classList.add("hidden");
      authForm.classList.remove("hidden");
      toggleRow.classList.remove("hidden");

      // ── Form submit ──
      authForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorEl.textContent = "";
        const email    = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        try {
          if (isSignup) {
            await createUserWithEmailAndPassword(auth, email, password);
          } else {
            await signInWithEmailAndPassword(auth, email, password);
          }
          window.location.replace("/");
        } catch (err) {
          errorEl.textContent = err.message;
        }
      });

      // ── Toggle login ↔ signup ──
      toggleBtn.addEventListener("click", () => {
        isSignup = !isSignup;
        errorEl.textContent = "";
        title.textContent      = isSignup ? "Create Account"          : "Fire Monitoring Login";
        submitBtn.textContent  = isSignup ? "Sign Up"                 : "Login";
        toggleText.textContent = isSignup ? "Already have an account?" : "Don't have an account?";
        toggleBtn.textContent  = isSignup ? "Login"                   : "Sign Up";
      });

    } catch (err) {
      // Config fetch failed — app.py is probably not running
      loadingMsg.textContent = "⚠️ Cannot connect to server. Is app.py running?";
      loadingMsg.classList.remove("text-gray-400");
      loadingMsg.classList.add("text-red-500");
      console.error("[FIRO] Firebase init failed:", err);
    }
  </script>

</body>
</html>
